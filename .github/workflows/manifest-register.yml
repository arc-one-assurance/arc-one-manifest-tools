# Reusable workflow — Register manifest on merge to main.
#
# Usage in an agent repo:
#   jobs:
#     register:
#       uses: arc-one-assurance/arc-one-manifest-tools/.github/workflows/manifest-register.yml@v1.0.0
#       secrets: inherit

name: Manifest Register

on:
  workflow_call:
    inputs:
      tools_ref:
        type: string
        default: v1.0.0
      manifest_path:
        type: string
        default: arc-one.agent.yaml
      resolved_manifest_path:
        type: string
        default: arc-one.agent.resolved.yaml
      connector_patch_script:
        type: string
        default: ""
      apply_on_push:
        type: boolean
        default: true
        description: When false, only validate + gate + dry-run (manual dry_run_only mode)
      arc_one_ui_url:
        type: string
        default: https://arc-one-sandbox.web.app
      workspace_label:
        type: string
        default: ""
      enable_audit:
        type: boolean
        default: true
        description: >-
          Correr el audit de código y reportarlo a Arc One tras publicar la versión
          (requiere CLI v1.5.0+; si el pin es viejo, avisa y sigue).
    secrets:
      ARC_ONE_API_BASE_URL:
        required: true
      ARC_ONE_BEARER_TOKEN:
        required: true
      ARC_ONE_AGENT_ID:
        required: false
      ARC_ONE_REGISTRATION_OWNER_USER_ID:
        required: false
      AWS_SERVICE_URL:
        required: false
      ARC_ONE_LLM_API_KEY:
        required: false
        description: Optional — habilita el juez LLM local en el audit (si no, juez hosteado o estático)

permissions:
  contents: read

jobs:
  register:
    name: Publicar versión
    runs-on: ubuntu-latest
    environment: arc-one-registration

    steps:
      - uses: actions/checkout@v4

      - uses: arc-one-assurance/arc-one-manifest-tools/setup@v1.0.0
        with:
          tools_ref: ${{ inputs.tools_ref }}

      - name: Validar estructura MADRE v1.1
        run: arc-one-manifest validate "${{ inputs.manifest_path }}"

      - name: Patch connector URL
        if: inputs.connector_patch_script != ''
        env:
          AWS_SERVICE_URL: ${{ secrets.AWS_SERVICE_URL }}
        run: |
          chmod +x "${{ inputs.connector_patch_script }}"
          "${{ inputs.connector_patch_script }}" \
            "${{ inputs.manifest_path }}" \
            "${{ inputs.resolved_manifest_path }}"

      - name: Validar manifest resuelto
        if: inputs.connector_patch_script != ''
        run: arc-one-manifest validate "${{ inputs.resolved_manifest_path }}" --no-placeholder

      - name: CI Gate — manifest drift + semver
        id: gate
        env:
          ARC_ONE_API_BASE_URL: ${{ secrets.ARC_ONE_API_BASE_URL }}
          ARC_ONE_BEARER_TOKEN: ${{ secrets.ARC_ONE_BEARER_TOKEN }}
          ARC_ONE_AGENT_ID: ${{ secrets.ARC_ONE_AGENT_ID }}
        run: |
          MANIFEST="${{ inputs.resolved_manifest_path }}"
          if [ -z "${{ inputs.connector_patch_script }}" ]; then
            MANIFEST="${{ inputs.manifest_path }}"
          fi
          arc-one-manifest gate "$MANIFEST" | tee gate.log
          if grep -q "CI Gate OK: no drift" gate.log; then
            echo "skip_apply=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Sin cambios material (skip registro)
        if: steps.gate.outputs.skip_apply == 'true'
        run: echo "Manifest sin drift vs Arc One — no se publica versión duplicada." >> "$GITHUB_STEP_SUMMARY"

      - name: Dry-run registration
        if: steps.gate.outputs.skip_apply != 'true'
        env:
          ARC_ONE_API_BASE_URL: ${{ secrets.ARC_ONE_API_BASE_URL }}
          ARC_ONE_BEARER_TOKEN: ${{ secrets.ARC_ONE_BEARER_TOKEN }}
          ARC_ONE_REGISTRATION_OWNER_USER_ID: ${{ secrets.ARC_ONE_REGISTRATION_OWNER_USER_ID }}
        run: |
          MANIFEST="${{ inputs.resolved_manifest_path }}"
          if [ -z "${{ inputs.connector_patch_script }}" ]; then
            MANIFEST="${{ inputs.manifest_path }}"
          fi
          arc-one-manifest register "$MANIFEST" --dry-run

      - name: Apply registration (new version)
        id: apply
        if: steps.gate.outputs.skip_apply != 'true' && inputs.apply_on_push
        env:
          ARC_ONE_API_BASE_URL: ${{ secrets.ARC_ONE_API_BASE_URL }}
          ARC_ONE_BEARER_TOKEN: ${{ secrets.ARC_ONE_BEARER_TOKEN }}
          ARC_ONE_REGISTRATION_OWNER_USER_ID: ${{ secrets.ARC_ONE_REGISTRATION_OWNER_USER_ID }}
        run: |
          MANIFEST="${{ inputs.resolved_manifest_path }}"
          if [ -z "${{ inputs.connector_patch_script }}" ]; then
            MANIFEST="${{ inputs.manifest_path }}"
          fi
          arc-one-manifest register "$MANIFEST" | tee registration.json

      # ⭐ El momento en que el brazo CÓDIGO deja de morir en el CI (Card 6 · delta E):
      # push a la rama por defecto = **materializa**. Corre DESPUÉS del registro, para que
      # el reporte cuelgue de la versión vigente y no de la anterior.
      #
      # 🔴 Va SIN `if: steps.gate.outputs.skip_apply != 'true'` a propósito: el caso que esta
      # fase vino a cubrir es justamente el push que **no** toca el manifiesto — ahí el gate
      # dice "sin drift", no se publica versión, y el código igual puede haberse despegado
      # de lo declarado. Saltar el audit cuando no hay versión nueva sería dejar ciego el
      # único camino que mira el código.
      - name: Manifest Intelligence — audit + reporte a Arc One
        if: inputs.enable_audit
        continue-on-error: true
        env:
          ARC_ONE_API_BASE_URL: ${{ secrets.ARC_ONE_API_BASE_URL }}
          ARC_ONE_BEARER_TOKEN: ${{ secrets.ARC_ONE_BEARER_TOKEN }}
          ARC_ONE_AGENT_ID: ${{ secrets.ARC_ONE_AGENT_ID }}
          ARC_ONE_LLM_API_KEY: ${{ secrets.ARC_ONE_LLM_API_KEY }}
        run: |
          REPORT_FLAG=""
          if arc-one-manifest audit --help 2>/dev/null | grep -q -- "--report-to-platform"; then
            REPORT_FLAG="--report-to-platform"
          else
            echo "::warning::El CLI pineado (tools_ref=${{ inputs.tools_ref }}) no soporta --report-to-platform (requiere v1.5.0+). El audit corre, pero Arc One no se entera."
          fi
          # `--scan-all` → alcance `full`: es el único que puede cerrar diferencias que ya
          # no se ven. Un `diff` acá dejaría hallazgos viejos abiertos para siempre.
          arc-one-manifest audit "${{ inputs.manifest_path }}" \
            --repo . \
            --scan-all \
            $REPORT_FLAG \
            --format markdown \
            --warn-only | tee audit.log
          {
            echo "### Manifest Intelligence"
            echo ""
            echo '```'
            cat audit.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Resumen — versión publicada
        if: steps.apply.outcome == 'success'
        run: |
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          data = json.load(open("registration.json"))
          agent_id = data.get("id") or "?"
          version = data.get("versionNumber") or "?"
          mode = data.get("mode") or "?"
          estado = data.get("estado") or "?"
          print("## ✅ Versión registrada en Arc One")
          print()
          print("| Campo | Valor |")
          print("|-------|-------|")
          print(f"| agent_id | `{agent_id}` |")
          print(f"| Versión | `{version}` |")
          print(f"| Modo | {mode} |")
          print(f"| Estado | {estado} |")
          PY
